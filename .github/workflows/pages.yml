name: Validate and deploy investor LLM vision map

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate JavaScript syntax
        run: |
          node --check data-ui.js
          node --check data-nodes-1.js
          node --check data-nodes-2.js
          node --check data-nodes-3.js
          node --check data-edges.js
          node --check app.js

      - name: Validate required presentation assets
        run: |
          test -s index.html
          test -s styles.css
          test -s map.css
          test -s data-ui.js
          test -s data-nodes-1.js
          test -s data-nodes-2.js
          test -s data-nodes-3.js
          test -s data-edges.js
          test -s app.js
          test -s system-flow-spec-v2.md
          test -s presentation-notes.md
          grep -q 'id="systemMap"' index.html
          grep -q 'id="particleLayer"' index.html
          grep -q 'data-lang="bg"' index.html
          grep -q 'data-lang="es"' index.html
          grep -q 'map.css' index.html
          grep -q 'data-ui.js' index.html
          grep -q 'data-edges.js' index.html
          grep -q 'window.GANEXITY_DATA' data-ui.js
          grep -q 'animateMotion' app.js

  deploy:
    if: github.event_name != 'pull_request'
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
